services:
  # -----------------------------------------------------
  # 1. Backend: Node.js + Python ML (Free Web Service)
  # -----------------------------------------------------
  - type: web
    name: agronex-backend
    env: docker
    region: oregon # or frankfurt/singapore depending on your preference
    plan: free
    rootDir: server
    dockerfilePath: ./Dockerfile
    envVars:
      # Optional: Put your Tomorrow.io key here if you want real weather alerts in production
      # - key: TOMORROW_KEY
      #   sync: false 
      - key: NODE_ENV
        value: production

  # -----------------------------------------------------
  # 2. Frontend: React Application (Free Static Site)
  # -----------------------------------------------------
  - type: web
    name: agronex-frontend
    env: static
    region: oregon
    plan: free
    rootDir: client
    buildCommand: npm install && npm run build
    publishPath: dist
    # Rewrite all routing to index.html for React Router
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
    envVars:
      # Automatically points to the backend deployed above
      - key: VITE_BACKEND_URL
        fromService:
          type: web
          name: agronex-backend
          envVarKey: RENDER_EXTERNAL_URL
      - key: VITE_DISEASE_API_URL
        fromService:
          type: web
          name: agronex-backend
          envVarKey: RENDER_EXTERNAL_URL
